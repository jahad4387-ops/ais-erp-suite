    ManagementAnalysisWarning:
      type: object
      required: [code, severity, message, evidenceRefs, drilldown]
      properties:
        code:
          type: string
          enum: [OVERDUE_AR, INVENTORY_STAGNATION]
        severity:
          type: string
          enum: [warning, blocking]
        message:
          type: string
        evidenceRefs:
          type: array
          items:
            type: string
        drilldown:
          $ref: "#/components/schemas/ManagementAnalysisDrilldown"

    ManagementAnalysisDrilldown:
      type: object
      required: [sourceType, path]
      properties:
        sourceType:
          type: string
        path:
          type: string

    ManagementAnalysisDrilldownRow:
      type: object
      properties:
        sourceType:
          type: string
        sourceId:
          type: string
        sourceNo:
          type: string
        partnerName:
          type: string
        itemName:
          type: string
        amount:
          type: number
        remainingAmount:
          type: number
        quantity:
          type: number
        documentDate:
          type: string
        dueDate:
          type: string
        daysPastDue:
          type: integer

    CreateAgentActionRequest:
      type: object
      required: [toolName, dryRun, evidenceRefs]
      properties:
        toolName:
          type: string
        dryRun:
          type: boolean
          const: true
        evidenceRefs:
          type: array
          items:
            type: string
        payload:
          type: object
          additionalProperties: true

    AgentAction:
      type: object
      required: [id, toolName, dryRun, riskLevel, status, evidenceRefs]
      properties:
        id:
          type: string
        toolName:
          type: string
        dryRun:
          type: boolean
        riskLevel:
          type: string
          enum: [low, medium, high]
        status:
          type: string
          enum: [drafted, approval_required, approved, executed, rejected]
        evidenceRefs:
          type: array
          items:
            type: string

    AuditLog:
      type: object
      required: [id, actorId, action, objectType, objectId, occurredAt]
      properties:
        id:
          type: string
        actorId:
          type: string
        action:
          type: string
        objectType:
          type: string
        objectId:
          type: string
        occurredAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: string
        message:
          type: string
        fieldErrors:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string
        traceId:
          type: string
        nextAction:
          type: string
