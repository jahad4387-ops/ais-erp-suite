  /agent-actions/{agentActionId}/reverse:
    post:
      summary: Reverse an executed Agent action through the audit trail.
      description: Records a compensating reversal event for an executed Agent action. It does not silently delete or mutate prior audit history; business correction still follows the relevant domain workflow.
      x-permission: agent_action.execute
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AgentActionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
