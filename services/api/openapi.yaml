              schema:
                $ref: "#/components/schemas/AgentAction"

  /agent-actions/{agentActionId}/execute:
    post:
      summary: Execute an approved Agent action.
      description: Execution can only be triggered by a real user confirmation when the action approval policy sets executeRequiresUserToken.
      x-permission: agent_action.execute
      x-risk-level: high
      x-agent-allowed: false
      parameters:
