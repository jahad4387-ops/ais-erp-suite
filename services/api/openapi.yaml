      summary: List Agent draft candidates for the review queue.
      description: Returns lightweight queue rows for pending and converted Agent-generated drafts. Use accountSetId, draftType, and status query parameters to filter the human review queue.
      x-permission: ai.generate_draft
      x-risk-level: low
      x-agent-allowed: true
      parameters:
        - name: accountSetId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [candidate, converted, rejected, archived]
        - name: draftType
          in: query
          required: false
          schema:
            type: string
            enum: [master_data, purchase_order, sales_order, inventory_movement, material_requisition, product_receipt, stock_count, voucher, payroll_allocation, depreciation_run, asset_change, report_interpretation]
      responses:
        "200":
          description: Agent draft candidate queue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDraftCandidateQueue"
    post:
      summary: Generate a Phase 6 Agent draft candidate through local OCR and the LLM Draft Adapter.
      description: Uploaded attachments are parsed by the local OCR placeholder first; OCR text, user instructions, evidence, and target schema are then passed to the LLM Draft Adapter. The result remains a candidate draft until human confirmation.
      x-permission: ai.generate_draft
      x-risk-level: medium
      x-agent-allowed: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentDraftCandidateRequest"
      responses:
        "201":
          description: Agent draft candidate created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDraftCandidate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /agent/draft-candidates/{agentDraftCandidateId}:
    get:
      summary: Get an Agent draft candidate for human review.
      description: Returns the candidate draft, OCR evidence, LLM draft run summary, unmatched fields, and dry-run result before conversion.
      x-permission: ai.generate_draft
      x-risk-level: low
      x-agent-allowed: true
      parameters:
        - name: agentDraftCandidateId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent draft candidate detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDraftCandidate"
        "404":
          $ref: "#/components/responses/NotFound"

  /agent/draft-candidates/{agentDraftCandidateId}/convert:
    post:
      summary: Convert a reviewed Agent draft candidate into a supported system draft.
      description: Requires a human-reviewed payload. The model candidate is never trusted directly; unresolved accounts, auxiliaries, master data, and evidence must be corrected before this endpoint creates a formal system draft. Current supported conversions are voucher drafts, purchase order drafts, sales order drafts, non-mutating inventory movement drafts, non-mutating material requisition drafts, non-mutating product receipt drafts, non-mutating stock count previews, non-mutating master data drafts, payroll allocation drafts, non-mutating depreciation dry-run drafts, fixed asset change drafts, and report interpretation drafts.
      x-permission: agent_draft.convert
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - name: agentDraftCandidateId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertAgentDraftCandidateRequest"
      responses:
        "201":
          description: Supported system draft created from reviewed Agent candidate.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Voucher"
                  - $ref: "#/components/schemas/PurchaseOrder"
                  - $ref: "#/components/schemas/SalesOrder"
                  - $ref: "#/components/schemas/InventoryMovementDraft"
                  - $ref: "#/components/schemas/MaterialRequisition"
                  - $ref: "#/components/schemas/ProductReceipt"
                  - $ref: "#/components/schemas/StockCountPreview"
                  - $ref: "#/components/schemas/AgentMasterDataDraft"
                  - $ref: "#/components/schemas/AgentPayrollAllocationDraft"
                  - $ref: "#/components/schemas/AgentDepreciationRunDraft"
                  - $ref: "#/components/schemas/AgentAssetChangeDraft"
                  - $ref: "#/components/schemas/AgentReportInterpretationDraft"
        "400":
          description: BUSINESS_RULE_FAILED.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /agent/draft-candidates/{agentDraftCandidateId}/reject:
    post:
      summary: Reject an Agent draft candidate after human review.
      description: Marks a candidate as rejected with a reviewer and reason. Rejected candidates remain in the review queue for auditability and cannot be converted into system drafts.
      x-permission: agent_draft.convert
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - name: agentDraftCandidateId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectAgentDraftCandidateRequest"
      responses:
        "200":
          description: Agent draft candidate rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDraftCandidate"
        "400":
          description: BUSINESS_RULE_FAILED.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /ai/ocr-preview:
    post:
      summary: Run local OCR / document parsing for uploaded Agent evidence before LLM draft generation.
      description: Parses uploaded attachments through the local OCR/document parser and returns reviewable text. The preview is dry-run only and does not create business drafts. Users can pass corrected text back as reviewedOcrResults when creating an Agent draft candidate.
      x-permission: ai.generate_draft
      x-risk-level: medium
      x-agent-allowed: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOcrPreviewRequest"
      responses:
        "201":
          description: OCR preview created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OcrPreview"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /ai/llm-draft-runs:
    get:
      summary: List recent provider-neutral LLM draft runs for Agent observability.
      description: Returns auditable LLM draft adapter runs by account set, status, and draft type. This is read-only and helps users inspect schema failures, provider failures, and completed model-assisted draft attempts without creating business drafts.
      x-permission: ai.generate_draft
      x-risk-level: low
      x-agent-allowed: true
      parameters:
        - name: accountSetId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [completed, failed]
        - name: draftType
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: LLM draft run list scoped to accessible account sets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmDraftRunList"
    post:
      summary: Reserve a provider-neutral LLM draft run API for structured draft generation.
      description: This API represents the model-facing draft adapter boundary. Business tools should call it through Agent draft candidate workflows rather than trusting raw model output. Attachment ids are resolved through the local OCR/document parser first; the LLM receives extracted text and evidence summaries, not unchecked raw files.
      x-permission: ai.generate_draft
      x-risk-level: medium
      x-agent-allowed: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentDraftCandidateRequest"
      responses:
        "201":
          description: LLM draft run created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmDraftRun"
        "400":
          $ref: "#/components/responses/BadRequest"

  /ai/llm-draft-runs/metrics:
    get:
      summary: Summarize LLM draft run quality and human review outcomes.
      description: Returns read-only evaluation metrics for the draft adapter, including schema success rate, candidate adoption, rejection, human correction, and provider/model breakdown. Metrics are scoped to accessible account sets.
      x-permission: ai.generate_draft
      x-risk-level: low
      x-agent-allowed: true
      parameters:
        - name: accountSetId
          in: query
          required: false
          schema:
            type: string
        - name: draftType
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: LLM draft metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmDraftMetrics"

  /agent-tools:
    get:
      summary: List registered Agent tools with schemas, risk, and approval policy.
      description: Tool Registry discovery endpoint for Agent Gateway clients. It exposes stable tool names, action kind, draft type, JSON Schemas, risk level, whether Agent tokens may call the tool, and the human approval policy.
      x-permission: agent_action.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Registered Agent tool list.
          content:
            application/json:
              schema:
                type: object
                required: [tools]
                properties:
                  tools:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentTool"

  /agent-tools/{toolName}/invoke:
    post:
      summary: Invoke a registered Agent tool in dry-run mode.
      description: Tool Registry invocation endpoint for external Agents. Draft-generation tools return an Agent draft candidate; other Agent-token-allowed tools return an AgentAction dry-run record. Formal execution still requires the Agent Action approval workflow.
      x-permission: agent_action.create
      x-risk-level: medium
      x-agent-allowed: true
      parameters:
        - name: toolName
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvokeAgentToolRequest"
      responses:
        "201":
          description: Agent tool dry-run invocation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentToolInvocationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Agent token is not allowed to invoke this tool directly.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /agent-actions:
    get:
      summary: List Agent actions and approval queue rows.
      description: Read-only queue for Agent actions, including dry-run status, risk level, approval progress, evidence count, requester, and execution markers. Supports account-set scoped filtering for Agent action lists and approval work queues.
      x-permission: agent_action.view
      x-risk-level: low
      x-agent-allowed: true
      parameters:
        - name: accountSetId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [dry_run_completed, submitted_for_approval, approved, executed, archived, rejected]
        - name: riskLevel
          in: query
          required: false
          schema:
            type: string
            enum: [low, medium, high]
        - name: toolName
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Agent action queue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentActionQueue"
    post:
      summary: Create an Agent action in dry-run mode.
      x-permission: agent_action.create
      x-risk-level: high
      x-agent-allowed: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentActionRequest"
      responses:
        "201":
          description: Agent action created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentAction"
        "400":
          $ref: "#/components/responses/BadRequest"

