      summary: Recalculate an unlocked report run unless the accounting period is closed.
      x-permission: report_run.manage
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - name: reportRunId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                recalculatedBy:
                  type: string
      responses:
        "200":
          description: Report run recalculated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportRun"
        "409":
          description: REPORT_RUN_LOCKED or REPORT_PERIOD_CLOSED.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /report-runs/{reportRunId}/lock:
    post:
      summary: Lock a report run so future rendering uses only stored calculatedValue snapshots.
      x-permission: report_run.manage
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - name: reportRunId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                lockedBy:
                  type: string
      responses:
        "200":
          description: Report run locked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportRun"
        "409":
          description: REPORT_CASH_FLOW_UNASSIGNED when a cash-flow report has cash or bank entries without cash-flow item assignments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /report-runs/{reportRunId}/submit-review:
    post:
      summary: Submit a report run to the Phase 5 report approval queue after blocking cash-flow assignment exceptions.
      x-permission: report_approval.manage
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - name: reportRunId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                submittedBy:
                  type: string
                reviewComment:
                  type: string
      responses:
        "201":
          description: Report approval submitted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportApproval"
        "409":
          description: REPORT_CASH_FLOW_UNASSIGNED when cash or bank entries are not assigned to cash-flow items.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - type: object
                    properties:
                      exceptions:
                        type: array
                        items:
                          $ref: "#/components/schemas/ReportApprovalException"

