              type: boolean
            minApprovals:
              type: integer
            executeRequiresUserToken:
              type: boolean
        inputSchema:
          type: object
          description: JSON Schema that the Agent Gateway must validate before dry-run.
          additionalProperties: true
        outputSchema:
          type: object
