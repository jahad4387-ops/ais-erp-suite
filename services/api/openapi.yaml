      type: object
      required: [approvedCount, requiredCount, remainingCount]
      properties:
        approvedCount:
          type: integer
        requiredCount:
          type: integer
        remainingCount:
          type: integer

    AgentActionAuditSummary:
      type: object
      required: [agentActionId, accountSetId, toolName, actionKind, status, riskLevel, requestedBy, approvalRequired, approvals, evidence, replay, dryRunStatus, executionStatus, reversalStatus, mutationState, nextActions]
      properties:
        agentActionId:
          type: string
        accountSetId:
          type: string
        toolName:
          type: string
        actionKind:
          type: string
        status:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high]
        requestedBy:
          type: string
        approvalRequired:
          type: boolean
        approvals:
          $ref: "#/components/schemas/AgentApprovalProgress"
        evidence:
          type: object
          required: [snapshotCount, verificationStatus, failedCount]
          properties:
            snapshotCount:
              type: integer
            verificationStatus:
              type: string
              enum: [pending, verified, failed]
            failedCount:
              type: integer
        replay:
          type: object
          required: [eventCount, eventTypes, lastEventType]
          properties:
            eventCount:
              type: integer
            eventTypes:
              type: array
              items:
                type: string
            lastEventType:
              type: string
              nullable: true
        dryRunStatus:
          type: string
          nullable: true
        executionStatus:
          type: string
          nullable: true
        reversalStatus:
          type: string
          nullable: true
        mutationState:
          type: string
          enum: [dry_run_only, executed_without_business_mutation, executed_with_business_mutation, reversed_without_business_mutation, reversed_with_business_mutation]
        nextActions:
          type: array
          items:
            type: string
            enum: [submit, approve, execute, reverse]

    AgentEvidenceSnapshot:
      type: object
      required: [attachmentId, checksum, byteSize, storageProvider, storageKey, capturedAt]
      properties:
        attachmentId:
          type: string
        checksum:
          type: string
          description: SHA-256 checksum captured before approval; execution fails if the current attachment checksum differs.
        byteSize:
          type: integer
        storageProvider:
          type: string
        storageKey:
          type: string
        capturedAt:
          type: string

    AgentActionReplay:
      type: object
      required: [agentActionId, auditSummary, events]
      properties:
        agentActionId:
          type: string
        auditSummary:
          $ref: "#/components/schemas/AgentActionAuditSummary"
        events:
          type: array
          items:
            type: object
            required: [id, agentActionId, eventType, actorId, payload, createdAt]
            properties:
              id:
                type: string
              agentActionId:
                type: string
              eventType:
                type: string
                enum: [input_received, dry_run_completed, submitted_for_approval, approved, evidence_verified, evidence_verification_failed, restore_drill_outbound_blocked, executed, reversed]
              actorId:
                type: string
              payload:
                type: object
                additionalProperties: true
              createdAt:
                type: string

    AuditLog:
      type: object
      required: [id, actorId, action, objectType, objectId, occurredAt]
      properties:
        id:
          type: string
        actorId:
          type: string
        action:
          type: string
        objectType:
          type: string
        objectId:
          type: string
        occurredAt:
          type: string
          format: date-time

    SecurityEventList:
      type: object
      required: [accountSetId, eventType, severity, actorId, total, items]
      properties:
        accountSetId:
          type: string
          nullable: true
        eventType:
          type: string
          nullable: true
        severity:
          type: string
          nullable: true
        actorId:
          type: string
          nullable: true
        total:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/SecurityEvent"

    SecurityEvent:
      type: object
      required: [id, eventType, severity, source, message, payload, createdAt]
      properties:
        id:
          type: string
        accountSetId:
          type: string
          nullable: true
        eventType:
          type: string
          enum: [permission_denied, idempotency_scope_mismatch]
        severity:
          type: string
          enum: [low, medium, high, critical]
        actorId:
          type: string
          nullable: true
        source:
          type: string
        objectType:
          type: string
          nullable: true
        objectId:
          type: string
          nullable: true
        message:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: string
        message:
          type: string
        fieldErrors:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string
        traceId:
          type: string
        nextAction:
          type: string
