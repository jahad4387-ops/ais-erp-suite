components:
  parameters:
    AccountSetId:
      name: accountSetId
      in: path
      required: true
      schema:
        type: string
    PeriodId:
      name: periodId
      in: path
      required: true
      schema:
        type: string
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
    AuxiliaryItemId:
      name: auxiliaryItemId
      in: path
      required: true
      schema:
        type: string
    VoucherId:
      name: voucherId
      in: path
      required: true
      schema:
        type: string
    PostingBatchId:
      name: postingBatchId
      in: path
      required: true
      schema:
        type: string
    AgentActionId:
      name: agentActionId
      in: path
      required: true
      schema:
        type: string
    PartnerId:
      name: partnerId
      in: path
      required: true
      schema:
        type: string
    PurchaseOrderId:
      name: purchaseOrderId
      in: path
      required: true
      schema:
        type: string
    SalesOrderId:
      name: salesOrderId
      in: path
      required: true
      schema:
        type: string
    AttachmentId:
      name: attachmentId
      in: path
      required: true
      schema:
        type: string
    AiSuggestionId:
      name: aiSuggestionId
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Required for write operations. Replays with the same key return the first committed result within the same account-set scope while the key is inside its TTL window. The default TTL is 7 days and deployments may set AIS_IDEMPOTENCY_TTL_HOURS or AIS_IDEMPOTENCY_TTL_MS. Reusing a non-expired key for another account set returns IDEMPOTENCY_SCOPE_MISMATCH; expired keys are purged before processing a new write request.
      schema:
        type: string
        minLength: 12

  responses:
    BadRequest:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Business state conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [accessToken, tokenType, user]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          enum: [Bearer]
        user:
          $ref: "#/components/schemas/AuthUser"

    AuthUser:
      type: object
      required: [id, username, name, role]
      properties:
        id:
          type: string
        username:
          type: string
        name:
          type: string
        role:
          type: string
        roleId:
          type: string

    Permission:
      type: object
      required: [code, description]
      properties:
        code:
          type: string
        description:
          type: string

    DeploymentConfig:
      type: object
      required: [deploymentMode, platformStore, database, jwt, attachmentStorage, ai, idempotency, restoreDrill]
      properties:
        deploymentMode:
          type: string
        platformStore:
          type: string
        database:
          type: object
          required: [provider, configured, urlPresent]
          properties:
            provider:
              type: string
              enum: [unconfigured, sqlite, postgresql, mysql, unknown]
            configured:
              type: boolean
            urlPresent:
              type: boolean
        jwt:
          type: object
          required: [secretConfigured, previousSecretsPresent, rotation]
          properties:
            secretConfigured:
              type: boolean
            previousSecretsPresent:
              type: boolean
            rotation:
              type: object
              required: [required, configured, approvedByPresent, expiresAt, monitorRefPresent, rollbackRefPresent]
              properties:
                required:
                  type: boolean
                configured:
                  type: boolean
                approvedByPresent:
                  type: boolean
                expiresAt:
                  type: string
                  nullable: true
                  format: date-time
                monitorRefPresent:
                  type: boolean
                rollbackRefPresent:
                  type: boolean
        attachmentStorage:
          type: object
          required: [provider, configured, rootPresent, external]
          properties:
            provider:
              type: string
              enum: [local, external]
            configured:
              type: boolean
            rootPresent:
              type: boolean
            external:
              type: object
              required: [endpointPresent, bucketPresent, credentialRefPresent, retentionDaysConfigured, retentionDays]
              properties:
                endpointPresent:
                  type: boolean
                bucketPresent:
                  type: boolean
                credentialRefPresent:
                  type: boolean
                retentionDaysConfigured:
                  type: boolean
                retentionDays:
                  type: integer
                  nullable: true
                  minimum: 1
        ai:
          type: object
          required: [ocr, llmDraft]
          properties:
            ocr:
              type: object
              required: [provider, model, configured, commandPresent]
              properties:
                provider:
                  type: string
                  description: OCR provider from AIS_OCR_PROVIDER. Defaults to local-ocr-placeholder. Use local-command-ocr with AIS_OCR_COMMAND, local-tesseract for a local OCR engine, or configured-local-ocr for an injected adapter.
                model:
                  type: string
                  description: OCR model from AIS_OCR_MODEL.
                configured:
                  type: boolean
                commandPresent:
                  type: boolean
                  description: True when AIS_OCR_COMMAND is configured or an injected local OCR adapter is active.
            llmDraft:
              type: object
              required: [provider, model, configured, timeoutMs, maxTokens, baseUrlPresent, apiKeyRefPresent, redaction]
              properties:
                provider:
                  type: string
                  description: Draft LLM provider from AIS_LLM_DRAFT_PROVIDER. Use openai-compatible for OpenAI-compatible model gateways.
                model:
                  type: string
                  description: Draft LLM model from AIS_LLM_DRAFT_MODEL.
                configured:
                  type: boolean
                timeoutMs:
                  type: integer
                  nullable: true
                  description: Timeout from AIS_LLM_DRAFT_TIMEOUT_MS.
                maxTokens:
                  type: integer
                  nullable: true
                  description: Token limit from AIS_LLM_DRAFT_MAX_TOKENS.
                baseUrlPresent:
                  type: boolean
                  description: Whether AIS_LLM_DRAFT_BASE_URL is configured.
                apiKeyRefPresent:
                  type: boolean
                  description: Whether AIS_LLM_DRAFT_API_KEY_REF is configured.
                redaction:
                  type: string
                  description: Redaction policy from AIS_LLM_DRAFT_REDACTION.
        idempotency:
          type: object
          required: [ttlMs, ttlHours]
          properties:
            ttlMs:
              type: number
              description: Idempotency cache TTL in milliseconds. Defaults to 7 days; can be configured with AIS_IDEMPOTENCY_TTL_MS or AIS_IDEMPOTENCY_TTL_HOURS.
            ttlHours:
              type: number
              description: Idempotency cache TTL in hours for deployment review.
        restoreDrill:
          type: object
          required: [enabled, silentSandbox, outboundBlocked, blockedChannels, envVar]
          properties:
            enabled:
              type: boolean
              description: True when RESTORE_DRILL or AIS_RESTORE_DRILL enables restore-drill mode.
            silentSandbox:
              type: boolean
              description: Restore-drill environments must behave as silent data islands.
            outboundBlocked:
              type: boolean
              description: True when outbound webhook, email, and bank API actions are blocked by the runtime.
            blockedChannels:
              type: array
              items:
                type: string
                enum: [webhook, email, bank_api]
            envVar:
              type: string
              nullable: true
              description: Environment variable that enabled restore-drill mode.

    CreateBackupJobRequest:
      type: object
      required: [accountSetId, backupType]
      properties:
        accountSetId:
          type: string
        backupType:
          type: string
          enum: [full, incremental]
        dryRun:
          type: boolean
          default: false
        includeAttachments:
          type: boolean
          default: true
        retentionDays:
          type: integer
          nullable: true
          minimum: 1
        requestedBy:
          type: string

    BackupJob:
      type: object
      required:
        [id, accountSetId, backupType, status, dryRun, businessMutation, includeAttachments, requestedBy, createdAt, completedAt, snapshotRef, checksum, manifest, attachmentHashVerification]
      properties:
        id:
          type: string
        accountSetId:
          type: string
        backupType:
          type: string
          enum: [full, incremental]
        status:
          type: string
          enum: [completed, dry_run_completed]
        dryRun:
          type: boolean
        businessMutation:
          type: boolean
          description: Always false; backup job creation records a manifest and does not mutate business ledgers.
        includeAttachments:
          type: boolean
        retentionDays:
          type: integer
          nullable: true
        requestedBy:
          type: string
        createdAt:
          type: string
        completedAt:
          type: string
        snapshotRef:
          type: string
        checksum:
          type: string
          description: sha256 checksum of the backup manifest and attachment hash verification summary.
        manifest:
          $ref: "#/components/schemas/BackupJobManifest"
        attachmentHashVerification:
          $ref: "#/components/schemas/AttachmentHashVerification"

    BackupJobManifest:
      type: object
      required: [accountSetId, accountSetCode, accountSetName, backupType, includeAttachments, tableCounts, generatedAt]
      properties:
        accountSetId:
          type: string
        accountSetCode:
          type: string
        accountSetName:
          type: string
        backupType:
          type: string
          enum: [full, incremental]
        includeAttachments:
          type: boolean
        tableCounts:
          type: object
          additionalProperties:
            type: integer
          description: Per-domain row counts including vouchers, inventory, payroll, fixed assets, reports, and attachments.
        generatedAt:
          type: string

    AttachmentHashVerification:
      type: object
