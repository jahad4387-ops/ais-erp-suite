          enum:
            - search_vouchers
            - search_ledger
            - search_reports
            - suggest_master_data_draft
            - suggest_purchase_order_draft
            - suggest_sales_order_draft
            - suggest_inventory_movement_draft
            - suggest_material_requisition_draft
            - suggest_product_receipt_draft
            - suggest_stock_count_draft
            - create_voucher_draft
            - suggest_payroll_allocation_draft
            - run_depreciation_dry_run
            - suggest_asset_change_draft
            - suggest_report_interpretation_draft
            - analyze_supply_chain_dashboard
            - detect_material_shortage
            - generate_purchase_suggestions
            - generate_production_plan
            - generate_work_orders_from_plan
            - generate_material_requisition
            - generate_product_receipt
            - generate_sales_delivery
            - analyze_inventory_availability
            - detect_inventory_anomalies
            - generate_stock_count_plan
            - generate_outsourcing_order
            - generate_rework_plan
            - trace_material_batch
            - calculate_work_order_cost
            - generate_cost_voucher_draft
            - run_supply_chain_close_check
            - run_close_checklist
            - post_approved_voucher
            - execute_approved_payment
            - close_approved_period
        title:
          type: string
        description:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high]
        actionKind:
          type: string
          enum: [query, draft_generation, dry_run, posting_execution, external_execution, period_execution]
        draftType:
          type: string
          nullable: true
          enum: [master_data, purchase_order, sales_order, inventory_movement, material_requisition, product_receipt, stock_count, voucher, payroll_allocation, depreciation_run, asset_change, report_interpretation, null]
