                  type: string
      responses:
        "200":
          description: Agent action submitted for approval.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentAction"

  /agent-actions/{agentActionId}/approve:
    post:
      summary: Approve a high-risk Agent action.
      x-permission: agent_action.approve
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AgentActionId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
