  /agent-actions/{agentActionId}/submit:
    post:
      summary: Submit a dry-run completed Agent action for approval.
      x-permission: agent_action.create
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AgentActionId"
