components:
  parameters:
    AccountSetId:
      name: accountSetId
      in: path
      required: true
      schema:
        type: string
    PeriodId:
      name: periodId
      in: path
      required: true
      schema:
        type: string
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
    AuxiliaryItemId:
      name: auxiliaryItemId
      in: path
      required: true
      schema:
        type: string
    VoucherId:
      name: voucherId
      in: path
      required: true
      schema:
        type: string
    PostingBatchId:
      name: postingBatchId
      in: path
      required: true
      schema:
        type: string
    AgentActionId:
      name: agentActionId
      in: path
      required: true
      schema:
        type: string
    PartnerId:
      name: partnerId
      in: path
      required: true
      schema:
        type: string
    PurchaseOrderId:
      name: purchaseOrderId
      in: path
      required: true
      schema:
        type: string
    SalesOrderId:
      name: salesOrderId
      in: path
      required: true
      schema:
        type: string
    AttachmentId:
      name: attachmentId
      in: path
      required: true
      schema:
        type: string
    AiSuggestionId:
      name: aiSuggestionId
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Required for write operations. Replays with the same key return the first committed result.
      schema:
        type: string
        minLength: 12

  responses:
    BadRequest:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Business state conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [accessToken, tokenType, user]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          enum: [Bearer]
        user:
          $ref: "#/components/schemas/AuthUser"

    AuthUser:
      type: object
      required: [id, username, name, role]
      properties:
        id:
          type: string
        username:
          type: string
        name:
          type: string
        role:
          type: string
        roleId:
          type: string

    Permission:
      type: object
      required: [code, description]
      properties:
        code:
          type: string
        description:
          type: string

    DeploymentConfig:
      type: object
      required: [deploymentMode, platformStore, database, jwt, attachmentStorage]
      properties:
        deploymentMode:
          type: string
        platformStore:
          type: string
        database:
          type: object
          required: [provider, configured, urlPresent]
          properties:
            provider:
              type: string
              enum: [unconfigured, sqlite, postgresql, mysql, unknown]
            configured:
              type: boolean
            urlPresent:
              type: boolean
        jwt:
          type: object
          required: [secretConfigured, previousSecretsPresent, rotation]
          properties:
            secretConfigured:
              type: boolean
            previousSecretsPresent:
              type: boolean
            rotation:
              type: object
              required: [required, configured, approvedByPresent, expiresAt, monitorRefPresent, rollbackRefPresent]
              properties:
                required:
                  type: boolean
                configured:
                  type: boolean
                approvedByPresent:
                  type: boolean
                expiresAt:
                  type: string
                  nullable: true
                  format: date-time
                monitorRefPresent:
                  type: boolean
                rollbackRefPresent:
                  type: boolean
        attachmentStorage:
          type: object
          required: [provider, configured, rootPresent, external]
          properties:
            provider:
              type: string
              enum: [local, external]
            configured:
              type: boolean
            rootPresent:
              type: boolean
            external:
              type: object
              required: [endpointPresent, bucketPresent, credentialRefPresent, retentionDaysConfigured, retentionDays]
              properties:
                endpointPresent:
                  type: boolean
                bucketPresent:
                  type: boolean
                credentialRefPresent:
                  type: boolean
                retentionDaysConfigured:
                  type: boolean
                retentionDays:
                  type: integer
                  nullable: true
                  minimum: 1

    Role:
      type: object
      required: [id, name, permissionCodes]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        permissionCodes:
          type: array
          items:
            type: string

    CreateRoleRequest:
      type: object
      required: [name, permissionCodes]
      properties:
        name:
          type: string
        description:
          type: string
        permissionCodes:
          type: array
          minItems: 1
          items:
            type: string
          createdBy:
            type: string

    UpdateRoleRequest:
      type: object
      required: [name, permissionCodes]
      properties:
        name:
          type: string
        description:
          type: string
        permissionCodes:
          type: array
          minItems: 1
          items:
            type: string
        updatedBy:
          type: string

    CreateUserRequest:
      type: object
      required: [username, password, roleId]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        name:
          type: string
        roleId:
          type: string
          createdBy:
            type: string

    DeleteUserRequest:
      type: object
      properties:
        deletedBy:
          type: string

    CreateAccountSetRequest:
      type: object
      required: [code, name, companyName, baseCurrency, accountingStandard, startYear, startPeriod]
      properties:
        code:
          type: string
        name:
          type: string
        companyName:
          type: string
        baseCurrency:
          type: string
          example: CNY
        accountingStandard:
          type: string
        startYear:
          type: integer
        startPeriod:
          type: integer
          minimum: 1
          maximum: 12

    UpdateAccountSetRequest:
      type: object
      properties:
        name:
          type: string
        companyName:
          type: string
        baseCurrency:
          type: string
          example: CNY
        accountingStandard:
          type: string
        startYear:
          type: integer
        startPeriod:
          type: integer
