openapi: 3.1.0
info:
  title: AIS ERP Suite API
  version: 0.2.0
  description: Phase 1 contract for platform setup, general ledger, AI voucher suggestions, and safe Agent operations.
servers:
  - url: http://localhost:3000
paths:
  /auth/login:
    post:
      summary: Authenticate a Phase 1 user and issue a bearer token.
      x-permission: public
      x-risk-level: low
      x-agent-allowed: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials.

  /permissions:
    get:
      summary: List permission codes available in Phase 1.
      x-permission: role.manage
      x-risk-level: low
      x-agent-allowed: false
      responses:
        "200":
          description: Permission list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permission"

  /deployment/config:
    get:
      summary: Inspect deployment configuration.
      x-permission: account_set.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Deployment configuration status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentConfig"

  /roles:
    get:
      summary: List roles and assigned permission codes.
      x-permission: role.manage
      x-risk-level: low
      x-agent-allowed: false
      responses:
        "200":
          description: Role list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      summary: Create a role from explicit permission codes.
      x-permission: role.manage
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Role created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
          "409":
            $ref: "#/components/responses/Conflict"

  /roles/{roleId}:
    patch:
      summary: Update an existing role and its permission codes.
      x-permission: role.manage
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: Role updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /users:
    get:
      summary: List sanitized users.
      x-permission: user.manage
      x-risk-level: low
      x-agent-allowed: false
      responses:
        "200":
          description: User list without password fields.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthUser"
    post:
      summary: Create a user and assign role permissions.
      x-permission: user.manage
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/{userId}:
    delete:
      summary: Delete a non-system user and remove related grants.
      x-permission: user.manage
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteUserRequest"
      responses:
        "200":
          description: User deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /account-sets:
    post:
      summary: Create an account set.
      x-permission: account_set.create
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountSetRequest"
      responses:
        "201":
          description: Account set created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: ATTACHMENT_EXTERNAL_STORAGE_REQUIRED or ATTACHMENT_EXTERNAL_OBJECT_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List account sets visible to the current user.
      x-permission: account_set.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Account set list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountSet"

  /account-sets/{accountSetId}:
    get:
      summary: Get an account set.
      x-permission: account_set.view
      x-risk-level: low
      x-agent-allowed: true
      parameters:
        - $ref: "#/components/parameters/AccountSetId"
      responses:
        "200":
          description: Account set detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSet"
        "404":
          description: ACCOUNT_SET_NOT_FOUND
    patch:
      summary: Update an account set.
      x-permission: account_set.manage
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountSetId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountSetRequest"
      responses:
        "200":
          description: Account set updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSet"
        "404":
          description: ACCOUNT_SET_NOT_FOUND

  /account-sets/{accountSetId}/enable:
    post:
      summary: Enable an account set after setup checks pass.
      x-permission: account_set.manage
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountSetId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Account set enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSet"
        "400":
          $ref: "#/components/responses/BadRequest"

  /account-sets/{accountSetId}/disable:
    post:
      summary: Disable an account set without deleting Phase 1 financial data.
      x-permission: account_set.manage
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountSetId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Account set disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSet"
        "400":
          $ref: "#/components/responses/BadRequest"

  /account-sets/{accountSetId}/users:
    get:
      summary: List users explicitly granted access to an account set.
      x-permission: account_set.manage
      x-risk-level: low
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountSetId"
      responses:
        "200":
          description: Account set user grants.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountSetUserGrant"
    post:
      summary: Grant a user access to an account set.
      x-permission: account_set_user.manage
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountSetId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantAccountSetUserRequest"
      responses:
        "201":
          description: User granted access to the account set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSetUserGrant"

  /account-sets/{accountSetId}/periods:
    get:
      summary: List accounting periods for an account set.
      x-permission: period.view
      x-risk-level: low
      x-agent-allowed: true
      parameters:
        - $ref: "#/components/parameters/AccountSetId"
      responses:
        "200":
          description: Account-set period list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountingPeriod"
        "404":
          description: ACCOUNT_SET_NOT_FOUND

  /account-sets/{accountSetId}/periods/generate:
    post:
      summary: Generate accounting periods for an account set.
      x-permission: period.open
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountSetId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "201":
          description: Periods generated.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountingPeriod"
        "400":
          $ref: "#/components/responses/BadRequest"

  /periods:
    get:
      summary: List fiscal periods for the active account set.
      x-permission: period.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Fiscal period list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountingPeriod"

  /periods/{periodId}/open:
    post:
      summary: Open an accounting period.
      x-permission: period.open
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/PeriodId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Period opened.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingPeriod"
        "400":
          $ref: "#/components/responses/BadRequest"

  /periods/{periodId}/close:
    post:
      summary: Close an accounting period after business checks pass.
      x-permission: period.close
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/PeriodId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Period closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingPeriod"
        "409":
          $ref: "#/components/responses/Conflict"

  /periods/{periodId}/lock:
    post:
      summary: Lock an accounting period for read-only access.
      x-permission: period.close
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/PeriodId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Period locked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingPeriod"
        "400":
          $ref: "#/components/responses/BadRequest"

  /periods/{periodId}/set-current:
    post:
      summary: Set the active current accounting period.
      x-permission: period.open
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/PeriodId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Current period changed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingPeriod"
        "400":
          $ref: "#/components/responses/BadRequest"

  /account-code-rules:
    post:
      summary: Create or replace the account code rule.
      x-permission: account.create
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountCodeRuleRequest"
      responses:
        "201":
          description: Account code rule saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountCodeRule"
        "400":
          $ref: "#/components/responses/BadRequest"

  /accounts:
    post:
      summary: Create a chart-of-accounts item.
      x-permission: account.create
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      summary: List chart-of-accounts items.
      x-permission: account.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Account list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"

  /accounts/tree:
    get:
      summary: List chart-of-accounts items as a parent-child tree.
      x-permission: account.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Account tree.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountTreeNode"

  /accounts/{accountId}:
    get:
      summary: Get a chart-of-accounts item.
      x-permission: account.view
      x-risk-level: low
      x-agent-allowed: true
      parameters:
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Account detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: ACCOUNT_NOT_FOUND
    patch:
      summary: Update a chart-of-accounts item.
      x-permission: account.update
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Account updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: ACCOUNT_NOT_FOUND
    delete:
      summary: Delete a chart-of-accounts item by disabling it.
      description: Phase 1 treats deletion as a soft delete so historical voucher references remain auditable.
      x-permission: account.delete
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Account disabled as deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: ACCOUNT_NOT_FOUND

  /accounts/import:
    post:
      summary: Import chart-of-accounts rows.
      x-permission: account.create
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportAccountsRequest"
      responses:
        "201":
          description: Imported account rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"

  /accounts/{accountId}/disable:
    post:
      summary: Disable a chart-of-accounts item.
      x-permission: account.update
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Account disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: ACCOUNT_NOT_FOUND

  /accounts/{accountId}/enable:
    post:
      summary: Enable a chart-of-accounts item.
      x-permission: account.update
      x-risk-level: high
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Account enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: ACCOUNT_NOT_FOUND

  /auxiliary-types:
    post:
      summary: Create an auxiliary accounting type.
      x-permission: auxiliary.manage
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuxiliaryTypeRequest"
      responses:
        "201":
          description: Auxiliary type created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuxiliaryType"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      summary: List auxiliary accounting types.
      x-permission: account.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Auxiliary type list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuxiliaryType"

  /auxiliary-items:
    post:
      summary: Create an auxiliary accounting item.
      x-permission: auxiliary.manage
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAuxiliaryItemRequest"
      responses:
        "201":
          description: Auxiliary item created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuxiliaryItem"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      summary: List auxiliary accounting items.
      x-permission: account.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Auxiliary item list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuxiliaryItem"

  /auxiliary-items/{auxiliaryItemId}:
    patch:
      summary: Update an auxiliary accounting item.
      x-permission: auxiliary.manage
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AuxiliaryItemId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                isEnabled:
                  type: boolean
                updatedBy:
                  type: string
      responses:
        "200":
          description: Auxiliary item updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuxiliaryItem"
    delete:
      summary: Soft-delete an auxiliary accounting item.
      x-permission: auxiliary.manage
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AuxiliaryItemId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Auxiliary item disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuxiliaryItem"

  /accounts/{accountId}/auxiliary-requirements:
    post:
      summary: Configure required auxiliary accounting dimensions for an account.
      x-permission: auxiliary.manage
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveAccountAuxiliaryRequirementRequest"
      responses:
        "201":
          description: Auxiliary requirement saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountAuxiliaryRequirement"
    get:
      summary: List required auxiliary dimensions for an account.
      x-permission: account.view
      x-risk-level: low
      x-agent-allowed: true
      parameters:
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Account auxiliary requirements.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountAuxiliaryRequirement"

  /opening-balances:
    post:
      summary: Save an account opening balance row.
      x-permission: opening_balance.manage
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveOpeningBalanceRequest"
      responses:
        "201":
          description: Opening balance saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpeningBalance"
    get:
      summary: List opening balance rows.
      x-permission: opening_balance.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Opening balance list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpeningBalance"

  /opening-balances/trial-balance:
    get:
      summary: Query opening balance trial balance.
      x-permission: opening_balance.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Opening trial balance result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpeningTrialBalance"

  /vouchers:
    post:
      summary: Create a voucher draft.
      x-permission: voucher.create
      x-risk-level: medium
      x-agent-allowed: false
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoucherRequest"
      responses:
        "201":
          description: Voucher draft created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Voucher"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      summary: List vouchers.
      x-permission: voucher.view
      x-risk-level: low
      x-agent-allowed: true
      responses:
        "200":
          description: Voucher list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Voucher"

  /vouchers/{voucherId}:
    get:
      summary: Get voucher detail.
      x-permission: voucher.view
      x-risk-level: low
      x-agent-allowed: true
      parameters:
        - $ref: "#/components/parameters/VoucherId"
      responses:
